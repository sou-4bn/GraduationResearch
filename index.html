<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>観光アクセスマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar glass-panel">
        <div class="brand-block">
          <div class="brand-mark">Y</div>
          <div>
            <p class="eyebrow">Yurihonjo Tourism Access</p>
            <h1>観光アクセスマップ</h1>
          </div>
        </div>

        <div class="control-block">
          <label class="select-stack" for="start-point-select">
            <span class="control-label">出発地点</span>
            <select id="start-point-select"></select>
          </label>
          <div id="filter-chips" class="chip-row" aria-label="絞り込み"></div>
          <p id="summary-text" class="summary-inline"></p>
        </div>
      </header>

      <aside class="floating-card legend-card glass-panel">
        <div class="legend-title-row">
          <h2>表示</h2>
          <button id="toggle-routes-button" class="ghost-button" type="button">路線表示中</button>
        </div>
        <div class="legend-list compact">
          <div class="legend-item"><span class="legend-dot excellent"></span><span>◎ 行きやすい</span></div>
          <div class="legend-item"><span class="legend-dot moderate"></span><span>○ やや行きやすい</span></div>
          <div class="legend-item"><span class="legend-dot poor"></span><span>× 行きにくい</span></div>
        </div>
      </aside>

      <main id="map" aria-label="観光地マップ"></main>

      <section id="detail-sheet" class="detail-sheet glass-panel is-collapsed" aria-live="polite">
        <button id="sheet-close-button" class="sheet-close-button" type="button" aria-label="閉じる">×</button>
        <div id="detail-content"></div>
      </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
