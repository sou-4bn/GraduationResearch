<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>観光アクセスガイド</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <h1>観光アクセスガイド</h1>

  <div class="container">
    <aside class="spot-list">
      <h2>観光地一覧</h2>

      <button id="filterToggleButton" class="filter-toggle-button">絞り込み・検索</button>

      <div id="filterPanel" class="filter-panel" hidden>
        <input type="text" id="searchInput" placeholder="観光地名で検索" />

        <select id="accessFilter">
          <option value="all">アクセス指標: すべて</option>
          <option value="〇">アクセス指標: 〇</option>
          <option value="△">アクセス指標: △</option>
          <option value="×">アクセス指標: ×</option>
        </select>
      </div>
      
      <div id="spotList"></div>
    </aside>

    <main class="main-content">
      <div class="map-wrapper">
        <div id="map"></div>

        <div class="map-legend">
          <h3>凡例</h3>
          <div class="legend-item">
            <span class="legend-point legend-spot"></span>
            <span>観光地</span>
          </div>
          <div class="legend-item">
            <span class="legend-point legend-station"></span>
            <span>駅</span>
          </div>
          <div class="legend-item">
            <span class="legend-line legend-rail"></span>
            <span>鉄道路線</span>
          </div>
        </div>
      </div>
      <div id="detail"></div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
